{% extends 'base.html' %}

{% block content %}

    <!-- Table -->
    <div class="card-section wide">
        <div class="card-header-blue">ยินดีต้อนรับเข้าสู่ประชากร</div>
        <table style="width:100%; border-collapse:collapse; text-align:center;">
            <thead>
                <tr style="background-color:#343a40; color:#fff;">
                    <th style="padding:10px; border:1px solid #ddd;">รหัสประชากร</th>
                    <th style="padding:10px; border:1px solid #ddd;">ชื่อประชากร</th>
                    <th style="padding:10px; border:1px solid #ddd;">อายุ</th>
                    <th style="padding:10px; border:1px solid #ddd;">วันที่</th>
                    <th style="padding:10px; border:1px solid #ddd;">แก้ไข</th>
                    <th style="padding:10px; border:1px solid #ddd;">ลบ</th>
                </tr>
            </thead>
            <tbody>
                {% for person in all_person %}
                <tr>
                    <th scope="row" style="padding:10px; border:1px solid #ddd;">{{ person.id }}</th>
                    <td style="padding:10px; border:1px solid #ddd;">{{ person.name }}</td>
                    <td style="padding:10px; border:1px solid #ddd;">{{ person.age }}</td>
                    <td style="padding:10px; border:1px solid #ddd;">{{ person.date }}</td>
                    <td style="padding:10px; border:1px solid #ddd;"><a href="/edit/{{ person.id }}/" class="btn btn-warning btn-sm">แก้ไข</a></td>
                    <td style="padding:10px; border:1px solid #ddd;"><a href="/delete/{{ person.id }}/" class="btn btn-danger btn-sm">ลบ</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

{% endblock %}
