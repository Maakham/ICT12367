<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียน - ICT12367 SPU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-white flex flex-col min-h-screen text-gray-800">

    <!-- แถบนำทาง -->
    <nav class="bg-[#333e4f] text-white py-3 px-6 shadow-md">
        <div class="container mx-auto max-w-5xl flex justify-between items-center">
            <div class="font-bold text-lg tracking-wide">ICT12367 SPU</div>
            <div class="space-x-6 text-sm">
                <a href="index" class="hover:text-gray-300">หน้าแรก</a>
                <a href="form" class="hover:text-gray-300">ลงทะเบียน</a>
                <a href="about" class="hover:text-gray-300">เกี่ยวกับเรา</a>
            </div>
        </div>
    </nav>

    <!-- รูปภาพแบนเนอร์ -->
    <div class="relative h-64 bg-gray-900 w-full max-w-5xl mx-auto">
        <img src="https://images.unsplash.com/photo-1559525839-b184a4d698c7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Banner" class="w-full h-full object-cover opacity-60">
        <div class="absolute inset-0 flex items-center justify-center">
            <h1 class="text-white text-2xl md:text-3xl font-bold text-center drop-shadow-lg px-4">ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h1>
        </div>
    </div>

    <!-- ส่วนเนื้อหาหลัก (ฟอร์ม) -->
    <main class="container mx-auto px-4 py-12 flex-grow flex justify-center items-start">
        
        <!-- กล่องฟอร์ม -->
        <div class="border border-gray-200 rounded shadow-md w-full max-w-md overflow-hidden bg-white">
            
            <!-- หัวข้อฟอร์ม -->
            <div class="bg-[#1a73e8] text-white text-center py-3 font-medium text-lg">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </div>
            
            <!-- ตัวฟอร์ม -->
            <form class="p-6 space-y-5" action="#" method="POST">
                <!-- สำหรับ Django อย่าลืมเพิ่ม {% csrf_token %} เมื่อใช้งานจริง -->
                
                <div>
                    <label class="block text-xs text-gray-600 mb-1">ชื่อประชากร</label>
                    <input type="text" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล" required
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-xs text-gray-600 mb-1">อายุ</label>
                    <input type="number" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข" required
                        class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
                </div>
                
                <!-- ปุ่มกด -->
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-[#1e8e3e] hover:bg-green-700 text-white px-4 py-2 rounded text-sm transition-colors shadow-sm">
                        ลงทะเบียน
                    </button>
                    <button type="reset" class="bg-[#d93025] hover:bg-red-700 text-white px-4 py-2 rounded text-sm transition-colors shadow-sm">
                        ล้างข้อมูล
                    </button>
                </div>
            </form>

        </div>

    </main>

    <!-- ส่วนท้าย -->
    <footer class="bg-[#333e4f] text-gray-300 text-center py-4 text-xs mt-auto">
        <div class="container mx-auto">
            © 2024 ICT12367 SPU | Information Technology
        </div>
    </footer>

</body>
</html>
